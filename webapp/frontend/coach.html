<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlastra — Coach</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=48">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="search"><span>⌕</span><input id="searchBox" placeholder="Search players, teams, matches…"><span class="kbd">/</span></div>
      <div class="tb-icons"><span>🔔</span><span>🌙</span><div class="avatar"></div></div>
    </div>
    <a class="back-btn" href="#" onclick="history.back();return false">← Back</a>

    <section class="card coach-hero" id="hero"><div class="placeholder-note">Loading…</div></section>

    <div class="grid" style="grid-template-columns:1.15fr 1fr; margin-top:18px">
      <section class="card"><div class="card-h"><h3>Managerial Career</h3></div>
        <div id="career" class="coach-career"></div></section>
      <section class="card"><div class="card-h"><h3>🏆 Trophies</h3></div>
        <div id="trophies" class="coach-trophies"></div></section>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/coach.js"></script>
</body>
</html>
