<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlastra — Match Previews</title>

<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="search"><span>⌕</span><input id="searchBox" placeholder="Search players, teams, matches…"><span class="kbd">/</span></div>
      <div class="tb-icons"><span class="badge" data-n="3">🔔</span><span>🔖</span><div class="avatar"></div></div>
    </div>

    <div class="breadcrumb"><a href="/live.html">Live Matches</a> › <b>Match Previews</b></div>

      <div><h2>Match Previews</h2><p>Auto-generated, data-driven previews for upcoming fixtures — recent form, head-to-head, key players, and a bookmaker projection.</p></div>
    </div>

    <div class="pv-layout">
      <section class="card pv-list-card"><div class="card-h"><h3>Upcoming</h3><span class="muted" id="pvCount" style="font-size:12px"></span></div>
        <div class="pv-fixtures" id="pvFixtures"></div></section>
      <div id="pv-out"></div>
    </div>
  </main>
</div>
<script src="/js/api.js?v=14"></script>
