<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlastra — Higher or Lower</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=45">
<style>
.hl-metrics{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.hl-metrics .lbl{color:var(--muted);font-size:12.5px;margin-right:2px}
.hl-board{display:grid;grid-template-columns:1fr 64px 1fr;gap:14px;align-items:stretch}
@media(max-width:680px){.hl-board{grid-template-columns:1fr;gap:10px}}
.hl-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 18px;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px}
.hl-photo{width:104px;height:104px;border-radius:50%;background:var(--card2);border:2px solid var(--border2);
  overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.hl-photo img{width:100%;height:100%;object-fit:cover}
.hl-photo .ini{font-size:34px;font-weight:800;color:var(--muted)}
.hl-nm{font-size:19px;font-weight:800;line-height:1.15}
.hl-sub{color:var(--muted);font-size:12.5px;margin-top:3px;display:flex;gap:6px;align-items:center;justify-content:center}
.hl-val{font-size:46px;font-weight:800;line-height:1;margin-top:14px;font-variant-numeric:tabular-nums;
  background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.hl-q{font-size:46px;font-weight:800;color:var(--muted2);margin-top:14px}
.hl-metric-tag{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-top:6px}
.hl-mid{display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--muted2)}
.hl-actions{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:16px}
.hl-actions .btn{width:100%}
.hl-vsbadge{width:44px;height:44px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:13px}
@media(max-width:680px){.hl-mid{height:28px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="search"><span>⌕</span><input id="searchBox" placeholder="Search players, teams, matches…"><span class="kbd">/</span></div>
      <div class="tb-icons"><span class="badge" data-n="3">🔔</span><span>🔖</span><div class="avatar"></div></div>
    </div>

    <div class="page-head">
      <div><h2>Higher or Lower</h2><p>Does the mystery player rank higher or lower than the one on the left? Keep the streak alive.</p></div>
    </div>

    <div class="gr-scoreboard" id="scoreboard"></div>
    <div class="hl-metrics" id="metrics"><span class="lbl">Compare by:</span></div>
    <div id="hl-out"><section class="card"><div class="placeholder-note">Loading players…</div></section></div>
  </main>
</div>
<style>
.gr-scoreboard{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.gr-sb{flex:1;min-width:104px;background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:11px 14px}
.gr-sb b{display:block;font-size:22px;font-weight:800;line-height:1.1}
.gr-sb span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.gr-sb.hot b{color:var(--gold)}
</style>
<script src="/js/api.js?v=19"></script>
<script src="/js/games.js?v=1"></script>
<script src="/js/higherlower.js?v=1"></script>
</body>
</html>
