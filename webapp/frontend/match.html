<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlastra — Match</title>
<!-- match view auto-collapses the sidebar for more room (doesn't change the saved
     preference, so other pages keep their state); set early to avoid any flash -->
<script>document.documentElement.classList.add('sb-collapsed');</script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=73">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="search"><span>⌕</span><input id="searchBox" placeholder="Search players, teams, matches…"><span class="kbd">/</span></div>
      <div class="tb-icons"><span class="badge" data-n="3">🔔</span><div class="avatar"></div></div>
    </div>

    <a href="/live.html" class="see" style="display:inline-block;margin-bottom:10px">← All matches</a>

    <section class="card match-hero" id="hero"><div class="placeholder-note">Loading match…</div></section>

    <div class="tabs" id="matchTabs"></div>
    <div id="tabBody"></div>
  </main>
</div>
<script src="/js/api.js?v=29"></script>
<script src="/js/games.js?v=2"></script>
<script src="/js/match.js?v=4"></script>
</body>
</html>
