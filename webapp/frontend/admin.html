<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlastra — Admin</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=42">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  .adm-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start}
  @media(max-width:1000px){.adm-grid{grid-template-columns:1fr}}
  .adm-chart{position:relative;height:230px}
  .adm-tbl{width:100%;border-collapse:collapse;font-size:13px}
  .adm-tbl td{padding:8px 6px;border-bottom:1px solid var(--border)}
  .adm-tbl td:last-child{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  .adm-tbl .p{color:var(--muted);word-break:break-all}
  .adm-list{display:flex;flex-direction:column;gap:2px}
  .adm-u{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 6px;border-bottom:1px solid var(--border)}
  .adm-u .who{display:flex;align-items:center;gap:8px;min-width:0}
  .adm-u .who b{font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .adm-u .when{color:var(--muted);font-size:12px;white-space:nowrap}
  .tag{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
       padding:2px 7px;border-radius:20px;border:1px solid var(--border2);color:var(--muted)}
  .tag.g{color:var(--accent2);border-color:var(--accent2)}
  .tag.a{color:var(--gold);border-color:var(--gold)}
  .adm-err{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="search"><span>⌕</span><input id="searchBox" placeholder="Search players, teams, matches…"><span class="kbd">/</span></div>
      <div class="tb-icons"><span class="badge" data-n="3">🔔</span><span>🔖</span><div class="avatar"></div></div>
    </div>

    <div class="page-head">
      <div><h2>Admin Dashboard</h2><p>Live usage — traffic rates, sign-ups, most-visited pages and engagement. Refreshes every 30s.</p></div>
    </div>

    <div id="adm-out"><div class="adm-err">Loading…</div></div>
  </main>
</div>
<script src="/js/api.js?v=17"></script>
<script src="/js/admin.js?v=1"></script>
</body>
</html>
