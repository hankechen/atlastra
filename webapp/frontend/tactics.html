<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlastra — Tactics Lab</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=75">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="search"><span>⌕</span><input id="searchBox" placeholder="Search players, teams, matches…"><span class="kbd">/</span></div>
      <div class="tb-icons"><span>🔔</span><span>🌙</span><div class="avatar"></div></div>
    </div>

    <div class="page-head">
      <div><h2>Tactics Lab <span class="tl-beta">beta</span></h2>
        <p>An explainable tactical sandbox. Build an XI, assign roles, tune the system — and see the projected profile, weaknesses and <b>why</b>, grounded in real player data. Add an opponent to simulate the matchup.</p></div>
    </div>

    <!-- controls -->
    <div class="tl-controls">
      <label class="tl-ctl"><span>Team</span><input id="teamInput" list="teamList" placeholder="e.g. Real Madrid"><datalist id="teamList"></datalist></label>
      <label class="tl-ctl"><span>Formation</span><select id="formSel"></select></label>
      <label class="tl-ctl"><span>Opponent <i class="tl-opt">(optional)</i></span><input id="oppInput" list="teamList" placeholder="none — profile mode"></label>
      <button id="loadBtn" class="btn btn-primary">Load</button>
    </div>

    <div id="tlBody" class="tl-body"></div>
  </main>
</div>
<script src="/js/api.js?v=29"></script>
<script src="/js/tactics.js?v=8"></script>
</body>
</html>
