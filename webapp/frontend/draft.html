<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlastra — Draft Battle</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=45">
<style>
.dft-top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.dft-budget{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.dft-b{flex:1;min-width:120px;background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:11px 14px}
.dft-b b{display:block;font-size:21px;font-weight:800;line-height:1.1;font-variant-numeric:tabular-nums}
.dft-b span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.dft-b.over b{color:var(--red)}
.dft-pitch{position:relative;background:linear-gradient(180deg,#1f7a44,#176437);border-radius:16px;
  padding:22px 10px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
html.light .dft-pitch{background:linear-gradient(180deg,#2f9a59,#218547)}
.dft-stripes{position:absolute;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0 44px,transparent 44px 88px);pointer-events:none}
.dft-rows{position:relative;display:flex;flex-direction:column;gap:14px}
.dft-row{display:flex;justify-content:space-around;gap:8px}
.dft-slot{width:88px;cursor:pointer;text-align:center;color:#fff}
.dft-av{width:58px;height:58px;border-radius:50%;margin:0 auto;background:rgba(0,0,0,.25);border:2px solid rgba(255,255,255,.6);
  display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.dft-av img{width:100%;height:100%;object-fit:cover}
.dft-av .plus{font-size:26px;color:rgba(255,255,255,.8);font-weight:300}
.dft-av .ini{font-size:18px;font-weight:800}
.dft-slot.empty .dft-av{border-style:dashed}
.dft-rat{position:absolute;right:-4px;bottom:-4px;background:var(--text);color:var(--bg);font-size:11px;font-weight:800;
  border-radius:8px;padding:0 4px;border:1px solid var(--bg)}
.dft-nm{font-size:11.5px;font-weight:700;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.dft-vl{font-size:10.5px;opacity:.85}
.dft-cat{font-size:11px;opacity:.85;margin-top:5px;font-weight:700;letter-spacing:.4px}
/* picker modal */
.pk-ov{position:fixed;inset:0;background:rgba(6,9,18,.66);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px}
.pk-card{background:var(--card);border:1px solid var(--border2);border-radius:16px;width:min(540px,96vw);max-height:84vh;display:flex;flex-direction:column;overflow:hidden}
.pk-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.pk-h h3{font-size:15px;font-weight:800}
.pk-x{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
.pk-search{margin:12px 16px;background:var(--elev);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;outline:none}
.pk-list{overflow:auto;padding:0 8px 10px}
.pk-row{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;cursor:pointer}
.pk-row:hover{background:var(--card2)}
.pk-row.dis{opacity:.4;cursor:not-allowed}
.pk-pic{width:34px;height:34px;border-radius:50%;overflow:hidden;background:var(--card2);position:relative;flex:none}
.pk-pic img{width:100%;height:100%;object-fit:cover}.pk-pic .ini{font-size:12px}
.pk-info{flex:1;min-width:0}.pk-info .nm{font-weight:600;font-size:13.5px}.pk-info .sub{color:var(--muted);font-size:11.5px}
.pk-rt{font-weight:800;font-size:15px}.pk-vl{color:var(--muted);font-size:12px;width:62px;text-align:right}
.dft-vs{display:flex;justify-content:center;align-items:flex-end;gap:26px;margin:14px 0}
.dft-vs .col{text-align:center}.dft-vs .col b{font-size:38px;font-weight:800;display:block;line-height:1}
.dft-vs .col span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="search"><span>⌕</span><input id="searchBox" placeholder="Search players, teams, matches…"><span class="kbd">/</span></div>
      <div class="tb-icons"><span class="badge" data-n="3">🔔</span><div class="avatar"></div></div>
    </div>

    <div class="page-head">
      <div><h2>Draft Battle</h2><p>You have a €300M cap. Draft the highest-rated XI you can, then see how close you got to the perfect team — and where you rank.</p></div>
    </div>

    <div class="dft-top" id="forms"></div>
    <div class="dft-budget" id="budget"></div>
    <div id="dft-out"><section class="card"><div class="placeholder-note">Loading squad pool…</div></section></div>
  </main>
</div>
<script src="/js/api.js?v=19"></script>
<script src="/js/games.js?v=1"></script>
<script src="/js/draft.js?v=1"></script>
</body>
</html>
